version: '3.8'
services:
  giropops-senhas:
    image: linuxtips/giropops-senhas:latest
    container_name: giropops-senhas
    ports:
      - "5000:5000"
    networks:
      - giropops
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=password
    volumes:
      - strigus:/strigus
    deploy:
      resources:
        reservations:
          cpus: '0.5'
          memory: 512M 
    depends_on:
      - redis  
    
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - giropops
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  giropops:
    driver: bridge

volumes:
  strigus:
